name: forgeiso-ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  ci-stage:
    name: "${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: c1
            label: "C1 Rust"
            dockerfile: containers/C1.rust.Dockerfile
            script: scripts/ci/c1-rust.sh
            cache: rust
            upload_artifacts: false
          - id: c2
            label: "C2 Go"
            dockerfile: containers/C2.go.Dockerfile
            script: scripts/ci/c2-go.sh
            cache: go
            upload_artifacts: false
          - id: c3
            label: "C3 GUI"
            dockerfile: containers/C3.gui.Dockerfile
            script: scripts/ci/c3-gui.sh
            cache: gui
            upload_artifacts: false
          - id: c4
            label: "C4 Security"
            dockerfile: containers/C4.security.Dockerfile
            script: scripts/ci/c4-security.sh
            cache: security
            upload_artifacts: true
          - id: c5
            label: "C5 Integration"
            dockerfile: containers/C5.integration.Dockerfile
            script: scripts/ci/c5-integration.sh
            cache: rust
            upload_artifacts: true
          - id: c6
            label: "C6 E2E Smoke"
            dockerfile: containers/C6.e2e.Dockerfile
            script: scripts/ci/c6-e2e.sh
            cache: rust
            upload_artifacts: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        if: matrix.cache == 'rust' || matrix.cache == 'gui'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.id }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Go
        if: matrix.cache == 'go'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('agent/go.sum') }}

      - name: Cache Node
        if: matrix.cache == 'gui'
        uses: actions/cache@v4
        with:
          path: |
            gui/node_modules
            ~/.npm
          key: node-${{ runner.os }}-${{ hashFiles('gui/package-lock.json') }}

      - name: Cache Scanner DB
        if: matrix.cache == 'security'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/.cache/grype
          key: scanner-${{ runner.os }}-${{ github.ref_name }}

      - name: Build CI container
        run: docker build -t forgeiso-${{ matrix.id }} -f ${{ matrix.dockerfile }} .

      - name: Run stage in ephemeral container
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            forgeiso-${{ matrix.id }} \
            bash -c "${{ matrix.script }}"

      - name: Normalize artifact ownership
        if: always() && matrix.upload_artifacts
        run: |
          if [[ -d artifacts ]]; then
            sudo chown -R "$(id -u):$(id -g)" artifacts
            chmod -R u+rwX,go+rX artifacts
          fi

      - name: Upload artifacts
        if: always() && matrix.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forgeiso-${{ matrix.id }}-artifacts
          path: |
            artifacts/**
          if-no-files-found: ignore
