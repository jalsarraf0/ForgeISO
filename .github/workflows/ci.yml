name: forgeiso-ci

on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  ci-stage:
    name: "${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: c2
            label: "C2 SBOM + Audit"
            dockerfile: containers/C2.sbom.Dockerfile
            script: scripts/ci/c2-sbom.sh
            cache: rust
          - id: c1
            label: "C1 Rust"
            dockerfile: containers/C1.rust.Dockerfile
            script: scripts/ci/c1-rust.sh
            cache: rust
          - id: c3
            label: "C3 GUI"
            dockerfile: containers/C3.gui.Dockerfile
            script: scripts/ci/c3-gui.sh
            cache: gui
          - id: c4
            label: "C4 Security"
            dockerfile: containers/C4.security.Dockerfile
            script: scripts/ci/c4-security.sh
            cache: security
          - id: c5
            label: "C5 Integration"
            dockerfile: containers/C5.integration.Dockerfile
            script: scripts/ci/c5-integration.sh
            cache: rust
          - id: c6
            label: "C6 E2E Smoke"
            dockerfile: containers/C6.e2e.Dockerfile
            script: scripts/ci/c6-e2e.sh
            cache: rust

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        if: matrix.cache == 'rust' || matrix.cache == 'gui'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.id }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node
        if: matrix.cache == 'gui'
        uses: actions/cache@v4
        with:
          path: |
            gui/node_modules
            ~/.npm
          key: node-${{ runner.os }}-${{ hashFiles('gui/package-lock.json') }}

      - name: Cache Scanner DB
        if: matrix.cache == 'security'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/.cache/grype
          key: scanner-${{ runner.os }}-${{ github.ref_name }}

      - name: Build CI container
        run: docker build -t forgeiso-${{ matrix.id }} -f ${{ matrix.dockerfile }} .

      - name: Run stage in ephemeral container
        run: |
          docker run --rm \
            -e CI=true \
            -v "$PWD:/workspace" \
            forgeiso-${{ matrix.id }} \
            bash -c "${{ matrix.script }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgeiso-${{ matrix.id }}-artifacts
          path: |
            artifacts/**
            **/build-report.json
            **/build-report.html
            **/sbom.cdx.json
            **/sbom.spdx.json
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci-stage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            ruby \
            ruby-dev \
            rpm \
            squashfs-tools \
            mtools \
            xorriso \
            libarchive-tools
          sudo gem install fpm --no-document
          # Install syft for SBOM generation in release artifacts
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin || true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust binaries
        run: |
          cargo build --release -p forgeiso-cli
          cargo build --release -p forgeiso-tui

      - name: Build all release packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release/make-packages.sh "${VERSION}"

      - name: Verify packages
        run: |
          cd dist/release
          sha256sum -c checksums.txt
          rpm -qip forgeiso-*.rpm 2>/dev/null | grep -E "Name|Version|Arch"
          dpkg-deb --info forgeiso_*.deb 2>/dev/null | grep -E "Package|Version|Arch"

      - name: Generate SBOM for release
        run: |
          if command -v syft >/dev/null 2>&1; then
            syft dir:. -o cyclonedx-json > dist/release/sbom.cdx.json
            syft dir:. -o spdx-json      > dist/release/sbom.spdx.json
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/forgeiso-*-1.x86_64.rpm
            dist/release/forgeiso_*-1_amd64.deb
            dist/release/forgeiso-*-1-x86_64.pkg.tar.zst
            dist/release/forgeiso-*-linux-x86_64.tar.gz
            dist/release/checksums.txt
            dist/release/sbom.cdx.json
            dist/release/sbom.spdx.json
          generate_release_notes: false
