services:
  c1:
    build:
      context: .
      dockerfile: containers/C1.rust.Dockerfile
    command: ["bash", "-lc", "scripts/ci/c1-rust.sh"]
    volumes:
      - .:/workspace
  c2:
    build:
      context: .
      dockerfile: containers/C2.go.Dockerfile
    command: ["bash", "-lc", "scripts/ci/c2-go.sh"]
    volumes:
      - .:/workspace
  c3:
